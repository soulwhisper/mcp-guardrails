[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcp-guardrails"
version = "0.3.5"
description = "ExtMcp gRPC guardrail sidecar for agentgateway — ONNX PromptGuard + Invariant Guardrails"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Soulwhisper" }]
keywords = ["agentgateway", "mcp", "guardrails", "promptguard", "onnx", "llm-security"]
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = [
    # grpcio/protobuf lower bounds are wire-compat critical: the committed
    # stubs are generated with grpcio-tools 1.82.1 (protobuf 7.35.x gencode),
    # and protobuf refuses to load gencode newer than its own runtime.
    "grpcio>=1.82.1,<1.83",
    "grpcio-health-checking>=1.82.1,<1.83",
    "protobuf>=7.35",
    # OpenTelemetry — always available; degrades gracefully to audit-log-only
    # when no OTLP endpoint is configured.
    "opentelemetry-sdk>=1.28.0",
    "opentelemetry-exporter-otlp>=1.28.0",
]

[project.optional-dependencies]
# ONNX PromptGuard — the primary semantic scanner. Uses the public, non-gated
# ONNX model (gravitee-io/Llama-Prompt-Guard-2-86M-onnx) via ONNX Runtime.
# Truly torch-free: we load the .onnx graph with onnxruntime directly and
# tokenise with transformers (tokenizer-only — no torch extra). optimum is
# intentionally NOT used because it hard-requires torch (~750MB).
# hf-xet enables Xet storage transfers (auto-detected when installed).
onnx = [
    "transformers>=4.51.3,<5",
    "onnxruntime>=1.20,<2",
    "huggingface-hub>=0.30.2,<1",
    "hf-xet>=1.5",
]

# AgentAlignment LLM — opt-in second-stage deep inspection. Calls an
# OpenAI-compatible LLM API when PromptGuard flags HUMAN_REVIEW.
alignment = [
    "openai>=1.76,<2",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5",
    "ruff>=0.6",
    "grpcio-tools>=1.82.1,<1.83",
]

[project.urls]
Homepage = "https://github.com/soulwhisper/mcp-guardrails"
Issues = "https://github.com/soulwhisper/mcp-guardrails/issues"

[tool.setuptools]
py-modules = ["server"]

[tool.setuptools.packages.find]
include = ["guardrails*"]
exclude = ["tests*", "proto*"]

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
# TEMP-DEBUG: CI bisect cycle 3 - deselect ts/rate/aggregate half of test_wave3_rules.py
addopts = "-ra --strict-markers --strict-config --deselect tests/test_wave3_rules.py::test_record_stamps_monotonic_ts --deselect tests/test_wave3_rules.py::test_entry_ts_defaults_to_zero_for_backcompat --deselect tests/test_wave3_rules.py::test_rate_limit_fires_over_threshold_same_tool --deselect tests/test_wave3_rules.py::test_rate_limit_counts_per_tool_name_not_pooled --deselect tests/test_wave3_rules.py::test_rate_limit_matcher_scopes_counting --deselect tests/test_wave3_rules.py::test_rate_limit_old_entries_slide_out --deselect tests/test_wave3_rules.py::test_rate_limit_legacy_zero_ts_counts_as_now --deselect tests/test_wave3_rules.py::test_rate_limit_validation --deselect tests/test_wave3_rules.py::test_rate_limit_plugs_into_engine_via_record --deselect tests/test_wave3_rules.py::test_aggregate_fires_when_sum_exceeds_budget --deselect tests/test_wave3_rules.py::test_aggregate_under_budget_does_not_fire --deselect tests/test_wave3_rules.py::test_aggregate_window_slides_out_exactly --deselect tests/test_wave3_rules.py::test_aggregate_tool_matcher_and_missing_or_bad_values --deselect tests/test_wave3_rules.py::test_aggregate_dotted_path_and_custom_cast --deselect tests/test_wave3_rules.py::test_aggregate_validation --deselect tests/test_wave3_rules.py::test_aggregate_plugs_into_engine_via_record"
markers = [
    "integration: end-to-end tests requiring a live gRPC server",
]
filterwarnings = [
    "error",
    'ignore::DeprecationWarning:grpc.*',
]

# ---------------------------------------------------------------------------
# ruff (lint + format)
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["proto/ext_mcp_pb2.py", "proto/ext_mcp_pb2_grpc.py"]

[tool.ruff.lint]
select = [
    "E", "F", "W",   # pycodestyle / pyflakes
    "I",              # isort
    "UP",             # pyupgrade
    "B",              # bugbear
    "SIM",            # simplify
    "RUF",            # ruff-specific
]
ignore = [
    "E501",   # line length handled by formatter
    "B008",   # function call in default argument (dataclass field factories)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "B017"]
"server.py" = ["E402"]

# ---------------------------------------------------------------------------
# coverage
# ---------------------------------------------------------------------------

[tool.coverage.run]
source = ["guardrails", "server"]
omit = ["guardrails/proto_bridge.py", "proto/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
