# mise — pinned dev/work environment for mcp-guardrails.
#
# `mise install` provisions Python 3.11 (prebuilt python-build-standalone,
# no compilation needed). Then `pip install -e ".[dev]"` pulls the test/lint
# stack. The heavy ML stack (onnxruntime/transformers) is intentionally NOT
# installed here — the unit suite runs in regex-only mode (see ci.yml).

[tools]
python = "3.11"

[env]
# Repo root on sys.path so `import guardrails` / `import server` work without
# an editable install, and so the committed proto stubs resolve.
PYTHONPATH = "{{ config_root }}"

[tasks.install]
description = "Install dev/test deps into the active Python (no ML stack)"
run = "pip install -e \".[dev]\""

[tasks.install-onnx]
description = "Install the ONNX PromptGuard stack (onnxruntime + transformers, NO torch)"
run = "pip install -e \".[onnx]\""

[tasks.download-model]
description = "Pre-download the ONNX PromptGuard model into the HF cache (reused by runs/tests). Fast via hf_transfer."
run = """
python - <<'PY'
import os
os.environ.setdefault("HF_HUB_ENABLE_HF_TRANSFER", "1")
from huggingface_hub import snapshot_download
p = snapshot_download(
    repo_id=os.environ.get("LF_ONNX_MODEL", "gravitee-io/Llama-Prompt-Guard-2-86M-onnx"),
    allow_patterns=[os.environ.get("LF_ONNX_FILE", "model.onnx"), "config.json", "tokenizer*", "special_tokens_map.json", "vocab*"],
)
print(f"model cached at {p}")
PY
"""

[tasks.test]
description = "Run the unit test suite"
run = "python -m pytest tests/ -q"

[tasks.lint]
description = "Lint with ruff"
run = "ruff check guardrails server.py tests scripts"

[tasks.proto-check]
description = "Verify committed proto stubs are in sync with the .proto"
run = "python scripts/proto_check.py"

[tasks.ci]
description = "What CI runs on every PR: lint + test + proto-check"
depends = ["lint", "test", "proto-check"]
run = "echo 'CI checks passed'"
