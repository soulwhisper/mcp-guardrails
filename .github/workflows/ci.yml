# Continuous integration — lint, unit tests with coverage, and proto-stub
# drift detection. Runs on every pull request and on every push to main.
#
# IMPORTANT: the test job deliberately does NOT install the heavy ML stack
# (llamafirewall / torch / transformers). The `[dev]` extra in pyproject.toml
# excludes ML deps so the unit tests run in regex-only mode, exercising the
# engine's graceful fallback path when LlamaFirewall is absent.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref (PRs re-push, main re-push).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        # Equivalent to `make lint`.
        run: ruff check guardrails server.py tests scripts

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev deps + gRPC stack (no ML stack)
        # The [dev] extra intentionally excludes llamafirewall/torch/transformers
        # so CI stays fast (~30s install vs ~5min). The engine falls back to
        # regex-only mode when LlamaFirewall import fails.
        # NOTE: do NOT add llamafirewall or torch here — the unit tests pass in
        # regex-only mode and keeping the ML stack out keeps CI fast.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install grpcio grpcio-health-checking pyyaml

      - name: Verify ML stack is NOT installed
        # Guard rail: fail fast if a future change accidentally pulls torch in.
        run: |
          python - <<'PY'
          import importlib.util as u
          for mod in ("torch", "transformers", "llamafirewall"):
              if u.find_spec(mod) is not None:
                  raise SystemExit(f"FAIL: {mod} is installed in CI — test job must stay ML-free")
          print("OK: no torch/transformers/llamafirewall in CI env")
          PY

      - name: Run pytest with coverage
        # The committed proto stubs are used as-is (no regeneration). The
        # proto-check job verifies they are in sync with the .proto.
        # Generates: coverage.xml (Codecov), term report.
        run: |
          python -m pytest tests/ -q \
              --cov=guardrails --cov=server \
              --cov-report=xml \
              --cov-report=term \
              --cov-report=json:coverage.json

      - name: Coverage summary to job summary
        # Emit a markdown coverage table to the GitHub Actions job summary so
        # the coverage % is visible on every CI run without leaving GitHub.
        if: always()
        run: |
          python - <<'PY'
          import json, os
          try:
              data = json.load(open("coverage.json"))
          except FileNotFoundError:
              print("coverage.json not found, skipping summary")
              raise SystemExit(0)
          totals = data.get("totals", {})
          pct = totals.get("percent_covered", 0.0)
          covered = totals.get("covered_lines", 0)
          missing = totals.get("missing_lines", 0)
          total = totals.get("num_statements", 0)
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if not summary:
              raise SystemExit(0)
          with open(summary, "a", encoding="utf-8") as fh:
              fh.write("## Coverage\n\n")
              fh.write(f"**{pct:.1f}%** covered — {covered} covered, {missing} missing, {total} total statements\n\n")
              fh.write("| Module | Statements | Missing | Cover |\n")
              fh.write("|--------|------------|---------|-------|\n")
              for fpath, fdata in sorted(data.get("files", {}).items()):
                  fp = fdata["summary"]["percent_covered"]
                  s = fdata["summary"]["num_statements"]
                  m = fdata["summary"]["missing_lines"]
                  fh.write(f"| `{fpath}` | {s} | {m} | {fp:.0f}% |\n")
          print(f"coverage summary written ({pct:.1f}%)")
          PY

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload to Codecov
        # Best-effort: skip when the token is not available (forks / dependabot).
        if: ${{ env.CODECOV_TOKEN != '' }}
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ env.CODECOV_TOKEN }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  proto-check:
    name: Proto stub drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install grpcio-tools
        # Pin to the 1.81.x line — the committed stubs were generated with
        # grpcio-tools 1.81.0. The proto_check script normalizes cosmetic
        # version differences, but staying on the same minor avoids drift.
        run: |
          python -m pip install --upgrade pip
          pip install "grpcio-tools>=1.81,<1.82"

      - name: Proto stub sync check (normalized)
        # Regenerates stubs into a temp dir and compares SEMANTIC content
        # (after normalizing toolchain-version cosmetics like version stamps,
        # class style, and f-string formatting) against the committed stubs.
        # Fails only on real proto contract drift, not patch-version bumps.
        run: python scripts/proto_check.py

  # Single required-status-check target for branch protection. Branch
  # protection can be configured to require only `ci-pass` instead of naming
  # every individual job — when new jobs are added to this workflow, branch
  # protection keeps working without manual edits.
  ci-pass:
    name: CI checks passed
    runs-on: ubuntu-latest
    needs: [lint, test, proto-check]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        # `needs` defaults to requiring success, but we set `if: always()` above
        # so this step runs even if a dependency was skipped — explicit guard.
        run: |
          if [[ "${{ needs.lint.result }}" != "success" \
             || "${{ needs.test.result }}" != "success" \
             || "${{ needs.proto-check.result }}" != "success" ]]; then
            echo "::error::One or more required CI jobs did not succeed"
            echo "lint=${{ needs.lint.result }} test=${{ needs.test.result }} proto-check=${{ needs.proto-check.result }}"
            exit 1
          fi
          echo "CI checks passed"

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@f72ff1a1336129f29bf0166c0fd0ca6cf1bcb38c # v1
