# Release Please — automated releases from conventional commits.
#
# On every push to main, release-please scans conventional commit messages,
# maintains a release PR that accumulates changelog entries, version bumps
# (pyproject.toml + __version__), and tag creation. When the release PR is
# merged, it creates a GitHub Release with the curated CHANGELOG section.
#
# The tag push triggers docker-publish.yml which builds and pushes the
# multi-arch container image.
#
# Token: use a GitHub App token, not GITHUB_TOKEN.
# GITHUB_TOKEN suppresses downstream workflow triggers — with it:
#   1. CI (ci.yml, pr.yml) will NOT run on the release PR branch.
#      The PR appears stuck with no status checks.
#   2. docker-publish.yml will NOT fire on the tag push after merge.
# A GitHub App token (via actions/create-github-app-token) acts like
# a PAT but is scoped to the repo and tied to the app installation.
# It triggers downstream workflows — CI runs on the release PR,
# docker-publish fires on the tag push.
#
# Prerequisites (repo admin, one-time setup):
#   Settings → Actions → General → Workflow permissions
#   ☑ Allow GitHub Actions to create and approve pull requests
#   ☑ Read and write permissions (not read-only)
#
#   GitHub App "repo-butler" must be installed on the repo with:
#   - Contents: Read & write
#   - Pull requests: Read & write
#   - Secrets APP_CLIENT_ID and APP_PRIVATE_KEY must be set
name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
