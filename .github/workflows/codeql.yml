# GitHub CodeQL static analysis for the Python codebase.
# Runs on pull requests to main (pre-merge) and on a weekly schedule
# (catch dependency CVEs). The push-to-main trigger is deliberately
# omitted — every PR already runs CodeQL, so re-running on merge is
# redundant.
name: CodeQL

on:
  pull_request:
    branches: [main]
  schedule:
    # 06:00 UTC every Monday — off-peak for runners.
    - cron: "0 6 * * 1"
permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@f72ff1a1336129f29bf0166c0fd0ca6cf1bcb38c # v1
