# Build and publish the multi-arch container image to GHCR.
#
# Triggers:
#   - push of version tags    -> tag the semver (e.g. 0.2.0, 0.2) + "latest"
#   - workflow_dispatch       -> manual run (tags from metadata-action)
#
# The push-to-main trigger is deliberately omitted — the tag push from
# release-please already covers every release, and branch-push builds
# were redundant with the tag build (two multi-arch builds for one merge).
# Use workflow_dispatch when you need a one-off `main` image.
#
# Version tags match BOTH conventions: `v0.2.0` (leading v) and bare `0.2.0`.
# The `push: tags` event fires on tag creation AND on tag force-update
# (re-pointing an existing tag); the `concurrency` group below cancels the
# superseded run so an updated tag rebuilds cleanly.
#
# The image is ghcr.io/soulwhisper/mcp-guardrails. Build args pass through
# PY_VERSION (defaults to 3.11-slim in the Dockerfile).
#
# GitHub Releases are created manually via the GitHub UI (tag → Draft a new
# release); this workflow only builds/pushes the container image.
name: Docker publish

on:
  push:
    tags: ["v*", "[0-9]*"]
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # buildx only updates the image manifest atomically at the very end of the
  # build, so cancelling a superseded run mid-build leaves no partial manifest.
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & push image (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU (for arm64 builds)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/soulwhisper/mcp-guardrails
          # On push of 1.2.3:   tag "1.2.3", "1.2", "latest"  (v1.2.3 also works)
          # On workflow_dispatch from main: tag "main"
          #
          # `type=semver` accepts a leading `v` OR a bare version, so both
          # `v0.2.0` and `0.2.0` produce `0.2.0` + `0.2`.
          # `latest` is enabled ONLY on tag pushes.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build & push (multi-arch, gha cache)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PY_VERSION=3.11-slim
          # The ONNX model (gravitee-io/Llama-Prompt-Guard-2-86M-onnx) is
          # public and non-gated, but HF_TOKEN avoids 429 rate-limiting
          # from shared GHA IPs during the models build stage.
          secrets: |
            "HF_TOKEN=${{ secrets.HF_TOKEN }}"
          cache-from: type=gha
          provenance: false

      - name: Generate image digest summary
        run: |
          echo "## Published image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

      # ---------------------------------------------------------------------
      # Advisory security scan of the published image — runs only on tag pushes
      # (actual releases). workflow_dispatch builds are ad-hoc and don't need
      # the scan.
      #
      # continue-on-error: true means a trivy finding does NOT block the
      # release — it surfaces as a warning in the run log for the maintainer
      # to triage. Promote this to a blocking gate (exit-code: 1) once the
      # baseline is established.
      #
      # trivy-action does not maintain stable major-version tags beyond @master;
      # pin to a commit SHA in production. For now @master is acceptable because
      # this step is advisory only.
      # ---------------------------------------------------------------------
      - name: Trivy scan of the published image
        if: github.ref_type == 'tag'
        continue-on-error: true
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          image-ref: ghcr.io/soulwhisper/mcp-guardrails:latest
          format: table
          exit-code: "0" # 0 = print findings but never fail (advisory)
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
