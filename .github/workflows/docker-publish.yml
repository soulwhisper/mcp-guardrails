# Build and publish the multi-arch container image to GHCR.
#
# Triggers:
#   - push to main            -> tag "main"
#   - push of version tags    -> tag the semver (e.g. 0.2.0, 0.2) + "latest"
#   - workflow_dispatch       -> manual run (tags from metadata-action)
#
# Version tags match BOTH conventions: `v0.2.0` (leading v) and bare `0.2.0`.
# The `push: tags` event fires on tag creation AND on tag force-update
# (re-pointing an existing tag); the `concurrency` group below cancels the
# superseded run so an updated tag rebuilds cleanly.
#
# The image is ghcr.io/soulwhisper/mcp-guardrails. Build args pass through
# PY_VERSION (defaults to 3.11-slim in the Dockerfile).
#
# GitHub Releases are created manually via the GitHub UI (tag → Draft a new
# release); this workflow only builds/pushes the container image.
name: Docker publish

on:
  push:
    branches: [main]
    tags: ["v*", "[0-9]*"]
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # buildx only updates the image manifest atomically at the very end of the
  # build, so cancelling a superseded run mid-build leaves no partial manifest.
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & push image (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/soulwhisper/mcp-guardrails
          # On push to main:    tag "main"
          # On push of 1.2.3:   tag "1.2.3", "1.2", "latest"  (v1.2.3 also works)
          # On workflow_dispatch: tag from the ref the run was dispatched on.
          #
          # `type=semver` accepts a leading `v` OR a bare version, so both
          # `v0.2.0` and `0.2.0` produce `0.2.0` + `0.2`.
          # `latest` is enabled ONLY on tag pushes so a version tag-push produces
          # `0.2.0` + `0.2` + `latest`, while a main-branch push does NOT retag
          # `latest` (main is a moving target, not a release).
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build & push (multi-arch, gha cache)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PY_VERSION=3.11-slim
            # Optional GFW / slow-network knob — set as a repository VARIABLE
            # (Settings → Secrets and variables → Actions → Variables), not a
            # secret, so it's readable here. Empty (unset) keeps the build
            # working unchanged.
            #   HF_ENDPOINT  e.g. https://hf-mirror.com  (HuggingFace mirror)
            HF_ENDPOINT=${{ vars.HF_ENDPOINT || '' }}
          # The ONNX model (gravitee-io/Llama-Prompt-Guard-2-86M-onnx) is
          # public and non-gated — NO HF_TOKEN needed. The Dockerfile's models
          # stage downloads it directly.
          #
          # To override the ONNX model file (e.g. use the quantized variant),
          # add LF_ONNX_FILE=model.quant.onnx to build-args above.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Generate image digest summary
        run: |
          echo "## Published image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

      # ---------------------------------------------------------------------
      # Advisory security scan of the published image.
      #
      # continue-on-error: true means a trivy finding does NOT block the
      # release — it surfaces as a warning in the run log for the maintainer
      # to triage. Promote this to a blocking gate (exit-code: 1) once the
      # baseline is established.
      #
      # trivy-action does not maintain stable major-version tags beyond @master;
      # pin to a commit SHA in production. For now @master is acceptable because
      # this step is advisory only.
      # ---------------------------------------------------------------------
      - name: Trivy scan of the published image
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          # Scan a deterministic tag: `latest` on tag pushes (just built), `main`
          # on main-branch pushes (just built). Both exist immediately after the
          # build-push step above. Uses ref_type (not a `v` prefix check) so bare
          # version tags like `0.2.0` also scan `latest`.
          image-ref: ghcr.io/soulwhisper/mcp-guardrails:${{ github.ref_type == 'tag' && 'latest' || 'main' }}
          format: table
          exit-code: "0" # 0 = print findings but never fail (advisory)
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@f72ff1a1336129f29bf0166c0fd0ca6cf1bcb38c # v1
