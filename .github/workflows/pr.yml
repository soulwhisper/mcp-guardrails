# Pull-request integration gate — runs the end-to-end smoke test on top of
# the ci.yml matrix. The smoke test boots the real guardrail server in a
# subprocess on 127.0.0.1:19099 and exercises health + CheckRequest +
# CheckResponse (allow / deny / INVALID_ARGUMENT paths) against the live
# gRPC surface. Localhost bindings are fine in CI runners.
name: PR e2e smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e:
    name: End-to-end smoke (live gRPC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev deps (no ML stack)
        # Same minimal install as ci.yml's test job. The smoke test runs with
        # ENABLE_PROMPTGUARD=0 so the engine uses its regex-only fallback.
        # grpcio, grpcio-health-checking, protobuf are now core deps installed
        # via -e ".[dev]"; grpcio-tools is in [dev] extras.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ensure proto stubs present
        run: |
          python -m grpc_tools.protoc -I proto \
              --python_out=proto --grpc_python_out=proto \
              proto/ext_mcp.proto

      - name: Run e2e smoke test
        # The script boots server.py on 127.0.0.1:19099 and exits non-zero on
        # any failed assertion. See tests/e2e_smoke.py for details.
        run: python tests/e2e_smoke.py
