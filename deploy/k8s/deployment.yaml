# Deployment for the ExtMcp guardrail sidecar.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-guardrails
  namespace: agent-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-guardrails
  template:
    metadata:
      labels:
        app: mcp-guardrails
    spec:
      containers:
        - name: guardrail
          image: ghcr.io/soulwhisper/mcp-guardrails:0.3.4  # x-release-please-version
          readinessProbe:
            grpc:
              port: 9001
              service: "ExtMcp"
