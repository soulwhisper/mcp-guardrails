# Example agentgateway configuration wiring the ExtMcp guardrail sidecar.
#
# This is a *standalone* agentgateway YAML config (not a Kubernetes manifest).
# It shows how a developer running agentgateway locally (e.g. on a laptop or
# homelab host) points the MCP guardrails processor at a sidecar listening on
# localhost:9001, with failureMode FailClosed and the standard request/response
# double-gate on tools/call.
#
# For the Kubernetes equivalent (Deployment + Service + AgentgatewayPolicy CRD)
# see deploy/k8s/.
#
# agentgateway docs: https://github.com/agentgateway/agentgateway
# Run locally with:    agentgateway run --config examples/agentgateway-local.yaml

listeners:
  - name: mcp-http
    protocol: mcp/streamable_http # agent front-door: Streamable HTTP MCP
    port: 8788

routes:
  - name: filesystem-mcp
    upstream: # the real MCP server you are protecting
      stdio:
        command: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]

# Guardrail sidecar. agentgateway calls both CheckRequest (before forwarding
# the agent's request upstream) and CheckResponse (before returning the
# upstream response to the agent) — this is what gives you a double gate on
# tools/call (Request+Response) where most injection traffic lives.
ext_mcp:
  # The sidecar speaks plaintext HTTP/2 (h2c) gRPC. In a container world
  # this is signalled to the gateway via appProtocol: kubernetes.io/h2c on
  # the Service; for a local config we just point at the insecure endpoint.
  endpoint: localhost:9001
  # FailClosed: if the sidecar is unreachable / errors, agentgateway denies
  # the MCP exchange and surfaces JSON-RPC -32001 to the agent. This is the
  # only safe default for write-capable agents.
  # FailOpen is available for read-only agents where a guardrail outage is
  # judged less harmful than blocking the agent.
  failureMode: FailClosed
  # Per-method gate selection. Full = invoke BOTH CheckRequest and
  # CheckResponse (the double gate). Request = CheckRequest only.
  # Response = CheckResponse only. None = skip the sidecar for that method.
  #
  # The recommended homelab baseline:
  #   tools/call     -> Full     (request params + tool output both scanned)
  #   tools/list     -> Response (scan tool descriptions for injection)
  #   prompts/get    -> Response (scan prompt bodies for injection)
  #   resources/read -> Response (scan resource contents for injection)
  methods:
    tools/call: Full
    tools/list: Response
    prompts/get: Response
    resources/read: Response
    # logging/setLevel, ping, initialize: not policy-relevant, skip.
    ping: None
    initialize: None
